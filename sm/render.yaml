services:
  - type: web
    name: studymatch-web
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: studymatch-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: studymatch-db
    plan: free
    postgresMajorVersion: "15"
