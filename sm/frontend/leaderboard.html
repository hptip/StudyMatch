<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>StudyMatch – Bảng xếp hạng</title><link rel="stylesheet" href="/css/style.css">
<script src="/js/theme.js"></script>
</head>
<body>
<div class="bg-grad"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>
<div class="app">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title">🏆 Bảng xếp hạng</div><div class="topbar-sub">Top sinh viên cộng đồng StudyMatch</div></div>
      <div class="topbar-actions"><button class="btn btn-icon theme-toggle-btn" title="Toggle Theme" style="margin-left:8px;">🌙</button>
        <select id="type-sel" class="form-control" style="width:170px" onchange="load()">
          <option value="reputation">⭐ Điểm uy tín</option>
          <option value="pairs">🤝 Số cặp học</option>
          <option value="rating">★ Rating giảng dạy</option>
        </select>
      </div>
    </div>
    <div class="content">
      <div id="lb-wrap"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
Auth.guard(); renderSidebar('leaderboard');
const ME = Auth.user();
async function load() {
  const type = document.getElementById('type-sel').value;
  const list = await api.get('/users/leaderboard/top?type='+type);
  const medals = ['🥇','🥈','🥉'];
  const valKey = { reputation: u=>`${u.reputation_score} điểm`, pairs: u=>`${u.total_pairs} cặp`, rating: u=>`${parseFloat(u.teaching_rating||0).toFixed(1)} ★` };
  document.getElementById('lb-wrap').innerHTML = `
    <div style="max-width:700px;margin:0 auto">
      ${list.map((u,i)=>`
        <div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:${u.id===ME?.id?'rgba(124,58,237,.12)':'var(--card)'};border:1px solid ${u.id===ME?.id?'rgba(124,58,237,.4)':'var(--border)'};border-radius:12px;margin-bottom:8px;transition:all .2s">
          <div style="font-size:${i<3?'26px':'16px'};font-weight:900;width:36px;text-align:center;color:${i===0?'#fbbf24':i===1?'#d1d5db':i===2?'#d97706':'var(--muted)'}">${i<3?medals[i]:i+1}</div>
          <div class="av" style="width:44px;height:44px;font-size:15px;border-radius:50%;flex-shrink:0">${initials(u.full_name)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700">${escHtml(u.full_name)} ${u.id===ME?.id?'<span style="font-size:10px;color:#a78bfa">(Bạn)</span>':''}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${escHtml(u.faculty||'Chưa cập nhật')} ${u.is_volunteer?'· 🙋 TNV':''}</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">${(u.badge_ids||[]).slice(0,3).map(b=>`<span style="font-size:10px">${{first_pair:'🤝',five_pairs:'⭐',top_rated:'🏆',volunteer:'🙋',rep_300:'💎',rep_1000:'🏅',complete_10:'📚'}[b]||'🎖️'}</span>`).join('')}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${valKey[type](u)}</div>
            ${starsHtml(u.teaching_rating)}
          </div>
        </div>`).join('')}
    </div>`;
}
load().catch(e=>Toast.error(e.message));
</script>
</body>
</html>
