<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin – Nhật ký</title><link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="bg-grad"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>
<div class="app">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title">📋 Nhật ký hoạt động</div><div class="topbar-sub">100 hoạt động gần nhất</div></div>
      <div class="topbar-actions"><button class="btn btn-secondary btn-sm" onclick="load()">🔄 Làm mới</button></div>
    </div>
    <div class="content">
      <div id="logs-wrap"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if (!Auth.guardAdmin()) {} else {
  renderSidebar('admin-logs');
  const icons = { register:'✍️', login:'🔑', ban:'🔒', unban:'🔓', change_role:'🔄', announcement:'📢', resolve_report:'✅', reset_password:'🔐' };
  const labels = { register:'Đăng ký', login:'Đăng nhập', ban:'Khóa TK', unban:'Mở khóa', change_role:'Đổi role', announcement:'Thông báo', resolve_report:'Xử lý BC', reset_password:'Reset Pass' };

  async function load() {
    const list = await api.get('/admin/logs');
    const el = document.getElementById('logs-wrap');
    if (!list.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><h3>Chưa có nhật ký</h3></div>`; return; }
    el.innerHTML = `<div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>Thời gian</th><th>Người dùng</th><th>Hành động</th><th>Chi tiết</th></tr></thead>
      <tbody>${list.map(l=>`<tr>
        <td style="font-size:11px;color:var(--muted);white-space:nowrap">${fmtTime(l.created_at)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:7px">
            <div class="av" style="width:24px;height:24px;font-size:8px;border-radius:50%">${initials(l.user?.full_name)}</div>
            <div><div style="font-size:12px;font-weight:600">${escHtml(l.user?.full_name||'System')}</div>
            <div style="font-size:10px;color:var(--muted)">${roleBadge(l.user?.role||'student')}</div></div>
          </div>
        </td>
        <td><span class="tag ${l.action==='ban'?'tag-red':l.action==='login'?'tag-blue':l.action==='register'?'tag-teach':'tag-purple'}" style="font-size:11px">${icons[l.action]||'📝'} ${labels[l.action]||l.action}</span></td>
        <td style="font-size:12px;color:var(--muted)">${escHtml(l.detail||'—')}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }
  window.load = load;
  load().catch(e=>Toast.error(e.message));
}
</script>
</body>
</html>
