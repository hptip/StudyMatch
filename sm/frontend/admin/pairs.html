<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin – Cặp đôi</title><link rel="stylesheet" href="/css/style.css">
<script src="/js/theme.js"></script>
</head>
<body>
<div class="bg-grad"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>
<div class="app">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title">🤝 Quản lý cặp đôi</div></div>
      <div class="topbar-actions"><button class="btn btn-icon theme-toggle-btn" title="Toggle Theme" style="margin-left:8px;">🌙</button>
        <select id="filter-st" class="form-control" style="width:160px" onchange="load()">
          <option value="">Tất cả</option>
          <option value="pending">⏳ Chờ xác nhận</option>
          <option value="active">✅ Đang học</option>
          <option value="completed">🎓 Hoàn thành</option>
          <option value="cancelled">🚫 Đã hủy</option>
          <option value="rejected">❌ Từ chối</option>
        </select>
      </div>
    </div>
    <div class="content">
      <div id="pairs-wrap"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if (!Auth.guardAdmin()) {} else {
  renderSidebar('admin-pairs');
  async function load() {
    const st = document.getElementById('filter-st').value;
    const list = await api.get('/admin/pairs'+(st?'?status='+st:''));
    const el = document.getElementById('pairs-wrap');
    if (!list.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">🤝</div><h3>Không có cặp nào</h3></div>`; return; }
    el.innerHTML = `<div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>#</th><th>Người gửi</th><th>Người nhận</th><th>Trạng thái</th><th>Lời nhắn</th><th>Ngày tạo</th><th>Hoàn thành</th></tr></thead>
      <tbody>${list.map((p,i)=>`<tr>
        <td style="color:var(--muted);font-size:12px">${i+1}</td>
        <td>
          <div style="display:flex;align-items:center;gap:7px">
            <div class="av" style="width:26px;height:26px;font-size:9px;border-radius:50%">${initials(p.requester?.full_name)}</div>
            <div><div style="font-size:12px;font-weight:600">${escHtml(p.requester?.full_name||'?')}</div>
            <div style="font-size:10px;color:var(--muted)">${escHtml(p.requester?.email||'')}</div></div>
          </div>
        </td>
        <td>
          <div style="display:flex;align-items:center;gap:7px">
            <div class="av" style="width:26px;height:26px;font-size:9px;border-radius:50%">${initials(p.target?.full_name)}</div>
            <div><div style="font-size:12px;font-weight:600">${escHtml(p.target?.full_name||'?')}</div>
            <div style="font-size:10px;color:var(--muted)">${escHtml(p.target?.email||'')}</div></div>
          </div>
        </td>
        <td>${pairStatusBadge(p.status)}</td>
        <td style="font-size:12px;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.message?`"${escHtml(p.message)}"`:''}</td>
        <td style="font-size:11px;color:var(--muted)">${fmt(p.created_at)}</td>
        <td style="font-size:11px;color:var(--muted)">${p.completed_at?fmt(p.completed_at):'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>
    <div style="margin-top:10px;font-size:12px;color:var(--muted)">Tổng: ${list.length} cặp</div>`;
  }
  window.load = load;
  load().catch(e=>Toast.error(e.message));
}
</script>
</body>
</html>
