<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin – Thông báo hệ thống</title><link rel="stylesheet" href="/css/style.css">
<script src="/js/theme.js"></script>
</head>
<body>
<div class="bg-grad"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>
<div class="app">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar"><div class="topbar-actions" style="margin-left:auto"><button class="btn btn-icon theme-toggle-btn" title="Toggle Theme" style="margin-left:8px;">🌙</button></div>
      <div><div class="topbar-title">📢 Thông báo hệ thống</div><div class="topbar-sub">Gửi thông báo đến tất cả sinh viên</div></div>
    </div>
    <div class="content">
      <div class="grid g2" style="align-items:start">
        <!-- Form tạo thông báo -->
        <div class="card">
          <div class="card-header"><div class="card-title">✏️ Tạo thông báo mới</div></div>
          <div class="form-group">
            <label class="form-label">Tiêu đề *</label>
            <input type="text" id="ann-title" class="form-control" placeholder="Tiêu đề thông báo...">
          </div>
          <div class="form-group">
            <label class="form-label">Nội dung *</label>
            <textarea id="ann-body" class="form-control" rows="4" placeholder="Nội dung chi tiết..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Loại thông báo</label>
            <select id="ann-type" class="form-control">
              <option value="info">ℹ️ Thông tin</option>
              <option value="success">✅ Thành công / Sự kiện tốt</option>
              <option value="warning">⚠️ Cảnh báo</option>
              <option value="error">❌ Khẩn cấp</option>
            </select>
          </div>
          <div style="background:var(--white-04);border-radius:8px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--muted)">
            ⚠️ Thông báo sẽ được gửi đến <strong style="color:#fff">tất cả sinh viên</strong> ngay lập tức qua hệ thống notification.
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="send()">📢 Gửi thông báo</button>
        </div>

        <!-- Preview + History -->
        <div style="display:flex;flex-direction:column;gap:16px">
          <!-- Preview -->
          <div class="card">
            <div class="card-header"><div class="card-title">👁 Preview</div></div>
            <div id="preview-wrap">
              <div class="ann-banner ann-info">
                <span>📢</span>
                <div>
                  <strong id="pv-title">Tiêu đề thông báo</strong>
                  <div style="font-size:12px;margin-top:3px;opacity:.8" id="pv-body">Nội dung thông báo sẽ hiển thị ở đây...</div>
                </div>
              </div>
            </div>
          </div>

          <!-- History -->
          <div class="card">
            <div class="card-header"><div class="card-title">📋 Lịch sử thông báo</div></div>
            <div id="ann-list"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if (!Auth.guardAdmin()) {} else {
  renderSidebar('admin-ann');
  const icons = { info:'ℹ️', success:'✅', warning:'⚠️', error:'❌' };

  // Live preview
  document.getElementById('ann-title').addEventListener('input', e => { document.getElementById('pv-title').textContent = e.target.value || 'Tiêu đề thông báo'; });
  document.getElementById('ann-body').addEventListener('input', e => { document.getElementById('pv-body').textContent = e.target.value || 'Nội dung...'; });
  document.getElementById('ann-type').addEventListener('change', e => {
    const pw = document.getElementById('preview-wrap');
    pw.querySelector('.ann-banner').className = `ann-banner ann-${e.target.value}`;
    pw.querySelector('span').textContent = icons[e.target.value]||'📢';
  });

  async function load() {
    const list = await api.get('/admin/announcements');
    const el = document.getElementById('ann-list');
    if (!list.length) { el.innerHTML = '<div style="font-size:13px;color:var(--muted)">Chưa có thông báo nào</div>'; return; }
    el.innerHTML = list.map(a => `
      <div style="padding:10px 12px;background:var(--white-04);border-radius:8px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start">
        <span style="font-size:18px">${icons[a.type]||'📢'}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${escHtml(a.title)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${escHtml(a.body)}</div>
          <div style="font-size:10px;color:var(--white-25);margin-top:4px">${fmtTime(a.created_at)}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="del('${a.id}')" title="Xóa">🗑</button>
      </div>`).join('');
  }

  async function send() {
    const title = document.getElementById('ann-title').value.trim();
    const body  = document.getElementById('ann-body').value.trim();
    const type  = document.getElementById('ann-type').value;
    if (!title || !body) return Toast.error('Vui lòng điền tiêu đề và nội dung');
    if (!confirm(`Gửi thông báo đến tất cả sinh viên?\n\n"${title}"`)) return;
    try {
      const r = await api.post('/admin/announcements', { title, body, type });
      Toast.success(`✅ Đã gửi đến ${r.message}`);
      document.getElementById('ann-title').value = '';
      document.getElementById('ann-body').value = '';
      await load();
    } catch(e) { Toast.error(e.message); }
  }

  async function del(id) {
    if (!confirm('Xóa thông báo này?')) return;
    try { await api.delete('/admin/announcements/'+id); Toast.success('Đã xóa'); await load(); } catch(e) { Toast.error(e.message); }
  }

  window.load = load;
  window.send = send;
  window.del = del;
  load().catch(e=>Toast.error(e.message));
}
</script>
</body>
</html>
